    <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <i data-lucide="hash" class="text-indigo-600"></i> Generator Nomor
                    </h2>
                    
                    <form id="formNomor" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Kategori Penandatangan</label>
                            <select id="kategoriPejabat" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50">
                                <option value="BUP">Bupati</option>
                                <option value="WABUP">Wakil Bupati</option>
                                <option value="SETDA">Sekretaris Daerah (Sekda)</option>
                                <option value="DINAS">Kepala Dinas / Badan/ Bagian</option>
                            </select>
                        </div>

                        <div class="relative">
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Kode Klasifikasi Arsip</label>
                            <input type="text" id="searchKlasifikasi" placeholder="Cari kode atau nama (ex: Kepegawaian)" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                            <div id="dropdownKlasifikasi" class="absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto hidden custom-scrollbar">
                                </div>
                            <input type="hidden" id="kodeTerpilih">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Nomor Urut</label>
                            <input type="number" id="noUrut" placeholder="Contoh: 0001" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Perihal</label>
                            <textarea id="perihal" rows="2" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Isi perihal surat..."></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Upload Scan Surat (Opsional)</label>
                            <input type="file" id="fileSurat" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                        </div>

                        <button type="submit" class="w-full bg-indigo-900 hover:bg-indigo-800 text-white font-bold py-3 rounded-xl transition shadow-lg flex items-center justify-center gap-2">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i> GENERATE NOMOR
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                        <h2 class="font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="table" class="text-indigo-600"></i> Register Penomoran Surat
                        </h2>
                        <button onclick="clearHistory()" class="text-xs text-red-500 hover:underline font-medium">Hapus Semua</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-100 text-slate-600 uppercase text-[10px] font-bold tracking-widest">
                                <tr>
                                    <th class="px-6 py-4 border-b">Nomor Surat (Full)</th>
                                    <th class="px-6 py-4 border-b">Perihal</th>
                                    <th class="px-6 py-4 border-b">Pejabat</th>
                                    <th class="px-6 py-4 border-b">File</th>
                                    <th class="px-6 py-4 border-b text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabelNomor" class="text-sm divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

        const searchInput = document.getElementById('searchKlasifikasi');
        const dropdown = document.getElementById('dropdownKlasifikasi');
        const kodeTerpilih = document.getElementById('kodeTerpilih');
        const role = localStorage.getItem('userRole') || 'USER';

        document.getElementById('role-badge').innerText = role;

        // SISTEM SEARCH KLASIFIKASI
        searchInput.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            dropdown.innerHTML = '';
            if(!val) { dropdown.classList.add('hidden'); return; }

            const filtered = dataKlasifikasi.filter(item => 
                item.kode.toLowerCase().includes(val) || item.nama.toLowerCase().includes(val)
            );

            if(filtered.length > 0) {
                dropdown.classList.remove('hidden');
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "px-4 py-2 hover:bg-indigo-50 cursor-pointer text-sm border-b border-slate-50";
                    div.innerHTML = `<span class="font-bold text-indigo-600">${item.kode}</span> - ${item.nama}`;
                    div.onclick = () => {
                        searchInput.value = `${item.kode} - ${item.nama}`;
                        kodeTerpilih.value = item.kode;
                        dropdown.classList.add('hidden');
                    };
                    dropdown.appendChild(div);
                });
            } else {
                dropdown.classList.add('hidden');
            }
        });

        // GENERATOR NOMOR BERDASARKAN PERMENDAGRI 83/2022
        document.getElementById('formNomor').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const pejabat = document.getElementById('kategoriPejabat').value;
            const kodeArsip = kodeTerpilih.value || "000";
            const noUrut = document.getElementById('noUrut').value;
            const tahun = new Date().getFullYear();
            
            let fullNomor = "";

            if(pejabat === 'BUP') fullNomor = `${kodeArsip}/${noUrut}/BUP-SBB/${tahun}`;
            else if(pejabat === 'WABUP') fullNomor = `${kodeArsip}/${noUrut}/WABUP-SBB/${tahun}`;
            else if(pejabat === 'SETDA') fullNomor = `${kodeArsip}/${noUrut}/SETDA-SBB/${tahun}`;
            else fullNomor = `${kodeArsip}/${noUrut}/BKPSDM/${tahun}`;

            const dataBaru = {
                nomor: fullNomor,
                perihal: document.getElementById('perihal').value,
                pejabat: pejabat,
                file: document.getElementById('fileSurat').value ? "Tersedia" : "Tidak Ada"
            };

            let history = JSON.parse(localStorage.getItem('riwayatPenomoran')) || [];
            history.unshift(dataBaru);
            localStorage.setItem('riwayatPenomoran', JSON.stringify(history));

            this.reset();
            renderTable();
            alert("Nomor Berhasil Dibuat: " + fullNomor);
        });

        function renderTable() {
            const history = JSON.parse(localStorage.getItem('riwayatPenomoran')) || [];
            const tabel = document.getElementById('tabelNomor');
            tabel.innerHTML = '';

            history.forEach((item, index) => {
                tabel.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4 font-mono font-bold text-indigo-700">${item.nomor}</td>
                        <td class="px-6 py-4 text-slate-600">${item.perihal}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 bg-slate-100 rounded text-[10px] font-bold">${item.pejabat}</span>
                        </td>
                        <td class="px-6 py-4 text-xs">
                            ${item.file === 'Tersedia' ? '<span class="text-green-600">✓ Berkas</span>' : '<span class="text-slate-300">-</span>'}
                        </td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="copyText('${item.nomor}')" class="p-2 text-slate-400 hover:text-indigo-600 transition" title="Copy Nomor">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            lucide.createIcons();
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("Nomor disalin ke clipboard!");
        }

        function clearHistory() {
            if(confirm("Hapus semua riwayat penomoran?")) {
                localStorage.removeItem('riwayatPenomoran');
                renderTable();
            }
        }

        renderTable();
        lucide.createIcons();
    </script>
