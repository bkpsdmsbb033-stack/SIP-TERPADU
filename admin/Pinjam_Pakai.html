<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinjam Pakai Aset - SIP-Terpadu</title>
    <!-- Resource Eksternal -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-slate-100 min-h-screen">

    <!-- NAVIGASI -->
    <nav class="bg-indigo-900 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <a href="admin.html" class="bg-white p-1.5 rounded-lg">
                        <i data-lucide="arrow-left" class="text-indigo-900 w-5 h-5"></i>
                    </a>
                    <span class="text-lg font-bold tracking-tighter uppercase">Pinjam Pakai Aset</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest leading-none">Petugas</p>
                        <p class="text-sm font-semibold" id="user-display">Administrator</p>
                    </div>
                    <div class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center border-2 border-indigo-400">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <!-- HEADER & ACTIONS -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Manajemen Peminjaman</h1>
                <p class="text-slate-500 text-sm">Kelola persetujuan peminjaman barang dan penggunaan gedung.</p>
            </div>
            <button onclick="bukaModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition shadow-lg shadow-indigo-200">
                <i data-lucide="plus" class="w-5 h-5"></i> Tambah Pinjam Pakai
            </button>
        </div>

        <!-- FILTER STATUS -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button class="bg-white px-4 py-2 rounded-lg text-xs font-bold shadow-sm border border-slate-200 text-indigo-600">Semua Data</button>
            <button class="bg-white px-4 py-2 rounded-lg text-xs font-bold shadow-sm border border-slate-200 text-slate-500 hover:text-indigo-600">Menunggu Verifikasi</button>
            <button class="bg-white px-4 py-2 rounded-lg text-xs font-bold shadow-sm border border-slate-200 text-slate-500 hover:text-indigo-600">Disetujui</button>
        </div>

        <!-- TABEL DATA -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest border-b">
                            <th class="px-6 py-4 font-bold">Peminjam</th>
                            <th class="px-6 py-4 font-bold">Item / Aset</th>
                            <th class="px-6 py-4 font-bold">Waktu Penggunaan</th>
                            <th class="px-6 py-4 font-bold">Status</th>
                            <th class="px-6 py-4 font-bold text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-peminjaman" class="text-sm text-slate-600 divide-y divide-slate-50">
                        <!-- Data akan dimuat melalui JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODAL FORM -->
    <div id="modal-form" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-6 border-b flex justify-between items-center bg-indigo-50">
                <h3 class="font-bold text-indigo-900 flex items-center gap-2">
                    <i data-lucide="calendar-plus" class="w-5 h-5"></i> Form Pinjam Pakai
                </h3>
                <button onclick="tutupModal()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form id="form-peminjaman" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nama Peminjam</label>
                    <input type="text" id="inp-peminjam" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Contoh: Budi Santoso">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Jenis Aset</label>
                        <select id="inp-jenis" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="Barang">Barang / Alat</option>
                            <option value="Gedung">Gedung / Ruangan</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nama Aset</label>
                        <input type="text" id="inp-aset" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Contoh: Ruang Aula">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Mulai Pakai</label>
                        <input type="date" id="inp-tgl-mulai" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Selesai</label>
                        <input type="date" id="inp-tgl-selesai" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Upload Dokumen Pendukung</label>
                    <input type="file" id="inp-file" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer border border-slate-200 rounded-xl p-1">
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="tutupModal()" class="flex-1 px-4 py-3 border border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition">Batal</button>
                    <button type="submit" class="flex-1 px-4 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition">Simpan Pesanan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        /**
         * INITIALIZATION
         */
        document.addEventListener('DOMContentLoaded', () => {
            renderTable();
            lucide.createIcons();
            
            const user = localStorage.getItem('userName');
            if (user) document.getElementById('user-display').innerText = user;
        });

        /**
         * MODAL ACTIONS
         */
        const modalEl = document.getElementById('modal-form');

        function bukaModal() {
            modalEl.classList.replace('hidden', 'flex');
        }

        function tutupModal() {
            modalEl.classList.replace('flex', 'hidden');
            document.getElementById('form-peminjaman').reset();
        }

        /**
         * DATA STORAGE & HANDLING
         */
        document.getElementById('form-peminjaman').addEventListener('submit', function(e) {
            e.preventDefault();

            const fileInput = document.getElementById('inp-file');
            let fileName = fileInput.files.length > 0 ? fileInput.files[0].name : null;

            const newBooking = {
                id: Date.now(),
                user: document.getElementById('inp-peminjam').value,
                jenis: document.getElementById('inp-jenis').value,
                namaAset: document.getElementById('inp-aset').value,
                tglMulai: document.getElementById('inp-tgl-mulai').value,
                tglSelesai: document.getElementById('inp-tgl-selesai').value,
                file: fileName,
                status: 'Disetujui'
            };

            let dataBooking = JSON.parse(localStorage.getItem('dataBooking')) || [];
            dataBooking.push(newBooking);
            localStorage.setItem('dataBooking', JSON.stringify(dataBooking));

            Swal.fire('Berhasil!', 'Data peminjaman dan dokumen telah disimpan.', 'success');
            tutupModal();
            renderTable();
        });

        function renderTable() {
            const data = JSON.parse(localStorage.getItem('dataBooking')) || [];
            const tableBody = document.getElementById('table-peminjaman');
            tableBody.innerHTML = '';

            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-400 italic">Belum ada data peminjaman aset.</td></tr>`;
                return;
            }

            data.slice().reverse().forEach(item => {
                const btnLihat = item.file 
                    ? `<button onclick="lihatDokumen('${item.file}')" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition" title="Lihat Dokumen">
                        <i data-lucide="eye" class="w-4 h-4"></i>
                       </button>`
                    : `<button disabled class="p-2 text-slate-300 cursor-not-allowed" title="Tidak ada dokumen">
                        <i data-lucide="eye-off" class="w-4 h-4"></i>
                       </button>`;

                const badgeClass = item.jenis === 'Gedung' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700';

                tableBody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800">${item.user}</div>
                            <div class="text-[10px] text-slate-400 uppercase tracking-tighter">ID: ${item.id}</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold ${badgeClass}">${item.jenis.toUpperCase()}</span>
                            <div class="font-medium text-slate-700 mt-1">${item.namaAset}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2 text-xs">
                                <i data-lucide="calendar" class="w-3.5 h-3.5 text-slate-400"></i>
                                <span class="font-semibold text-slate-600">${item.tglMulai}</span>
                                <span class="text-slate-300">|</span>
                                <span class="text-slate-500">${item.tglSelesai}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold bg-green-100 text-green-700">Aktif</span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="flex justify-center gap-1">
                                ${btnLihat}
                                <button onclick="hapusData(${item.id})" class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition" title="Hapus">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `);
            });
            lucide.createIcons();
        }

        function lihatDokumen(fileName) {
            Swal.fire({
                title: 'Dokumen Terlampir',
                text: 'Nama file: ' + fileName,
                icon: 'info',
                confirmButtonText: 'Tutup'
            });
        }

        function hapusData(id) {
            Swal.fire({
                title: 'Hapus Data?',
                text: "Data peminjaman akan dihapus permanen.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Hapus!'
            }).then((result) => {
                if (result.isConfirmed) {
                    let data = JSON.parse(localStorage.getItem('dataBooking')) || [];
                    data = data.filter(item => item.id !== id);
                    localStorage.setItem('dataBooking', JSON.stringify(data));
                    renderTable();
                    Swal.fire('Terhapus!', 'Data berhasil dibuang.', 'success');
                }
            });
        }
    </script>
</body>

</html>
