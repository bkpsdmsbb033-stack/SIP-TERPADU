<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Masuk - SIP Terpadu</title>
    
    <!-- Resource Eksternal -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .print-area { width: 100%; border: none; }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    <!-- NAVIGASI -->
    <nav class="bg-indigo-900 text-white shadow-md px-6 py-4 flex justify-between items-center no-print">
        <div class="flex items-center gap-3">
            <a href="admin.html" class="hover:bg-indigo-800 p-2 rounded-lg transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <h1 class="font-bold tracking-tight">INPUT SURAT MASUK</h1>
        </div>
        <div id="role-badge" class="px-3 py-1 bg-indigo-700 rounded-full text-xs font-bold uppercase">Role</div>
    </nav>

    <main class="container mx-auto px-4 py-8">

        <!-- FORM SECTION -->
        <div id="form-section" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 hidden no-print">
            <h2 id="form-title" class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                <i data-lucide="file-plus" class="text-indigo-600"></i> Registrasi Surat Baru
            </h2>
            
            <form id="formSurat" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="hidden" id="editIndex" value="-1">
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Nomor Agenda</label>
                    <input type="text" id="noAgenda" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Tanggal Terima</label>
                    <input type="date" id="tglTerima" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Tanggal Surat</label>
                    <input type="date" id="tglSurat" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Nomor Surat</label>
                    <input type="text" id="noSurat" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Asal Surat</label>
                    <input type="text" id="asalSurat" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Instansi/Pengirim">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Posisi Surat Saat Ini</label>
                    <input type="text" id="posisiSurat" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Contoh: Meja Kadis">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Status Proses</label>
                    <select id="statusSurat" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                        <option value="Pending">Pending (Menunggu)</option>
                        <option value="Proses">Dalam Proses</option>
                        <option value="Selesai">Selesai / Diarsipkan</option>
                    </select>
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Perihal / Isi Ringkas</label>
                    <input type="text" id="perihal" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Upload Berkas (PDF, Max 5MB)</label>
                    <input type="file" id="berkasSurat" accept=".pdf" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>
                
                <div class="md:col-span-3 flex justify-end gap-3 border-t pt-4">
                    <button type="button" id="cancelEdit" class="hidden px-6 py-2.5 rounded-xl border border-slate-300 font-bold text-slate-600 hover:bg-slate-100 transition">Batal</button>
                    <button type="submit" id="btnSimpan" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 py-2.5 rounded-xl transition shadow-lg flex items-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i> Simpan Registrasi
                    </button>
                </div>
            </form>
        </div>

        <!-- TABLE SECTION -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden print-area">
            <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center bg-slate-50/50 gap-4">
                <h2 class="font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="database" class="text-indigo-600 w-5 h-5"></i> Arsip Surat Masuk
                </h2>
                <div class="flex items-center gap-2 no-print">
                    <button onclick="exportExcel()" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700 transition">
                        <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> EXCEL
                    </button>
                    <button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 bg-slate-700 text-white text-xs font-bold rounded-lg hover:bg-slate-800 transition">
                        <i data-lucide="printer" class="w-4 h-4"></i> CETAK
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="tableToPrint">
                    <thead class="bg-slate-50 text-slate-600 uppercase text-[10px] font-bold tracking-wider">
                        <tr>
                            <th class="px-6 py-4 border-b">Agenda</th>
                            <th class="px-6 py-4 border-b">Tgl Terima / Surat</th>
                            <th class="px-6 py-4 border-b">Asal & Perihal</th>
                            <th class="px-6 py-4 border-b text-center">Status</th>
                            <th class="px-6 py-4 border-b">Posisi Terakhir</th>
                            <th class="px-6 py-4 border-b text-center no-print">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelSurat" class="text-sm text-slate-700 divide-y divide-slate-100">
                        <!-- Data dikelola melalui JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // --- KONFIGURASI AWAL ---
        const role = localStorage.getItem('userRole') || 'USER';
        document.getElementById('role-badge').innerText = role;

        if (role !== 'USER') {
            document.getElementById('form-section').classList.remove('hidden');
        }

        const form = document.getElementById('formSurat');
        const tabel = document.getElementById('tabelSurat');
        const editIndexInput = document.getElementById('editIndex');

        // --- FUNGSI CORE ---
        function loadData() {
            const data = JSON.parse(localStorage.getItem('arsipSuratMasuk')) || [];
            tabel.innerHTML = '';

            data.forEach((item, index) => {
                let statusClass = "bg-amber-100 text-amber-700";
                if (item.status === "Proses") statusClass = "bg-blue-100 text-blue-700";
                if (item.status === "Selesai") statusClass = "bg-green-100 text-green-700";

                const fileAction = item.fileData ?
                    `<button onclick="viewFile(${index})" class="p-2 bg-emerald-50 text-emerald-600 rounded-lg hover:bg-emerald-600 hover:text-white transition" title="Lihat Dokumen">
                        <i data-lucide="eye" class="w-4 h-4"></i>
                     </button>` :
                    `<button disabled class="p-2 bg-slate-50 text-slate-300 rounded-lg cursor-not-allowed" title="Tidak ada file">
                        <i data-lucide="eye-off" class="w-4 h-4"></i>
                     </button>`;

                const row = `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4 font-bold text-indigo-600">${item.noAgenda}</td>
                        <td class="px-6 py-4">
                            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">Terima: ${item.tglTerima}</div>
                            <div class="text-[10px] text-indigo-500 uppercase font-bold tracking-tighter">Surat: ${item.tglSurat || '-'}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="font-bold">${item.asalSurat}</div>
                            <div class="text-xs text-slate-400 font-mono">${item.noSurat}</div>
                            <div class="text-[11px] text-slate-500 mt-1">${item.perihal}</div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${statusClass}">
                                ${item.status || 'Pending'}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2 text-xs font-medium text-slate-600">
                                <i data-lucide="map-pin" class="w-3 h-3 text-red-500"></i>
                                ${item.posisi || '-'}
                            </div>
                        </td>
                        <td class="px-6 py-4 text-center no-print">
                            <div class="flex justify-center gap-2">
                                ${fileAction}
                                <button onclick="editSurat(${index})" class="p-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-600 hover:text-white transition" title="Edit">
                                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                                </button>
                                <button onclick="disposisiSurat(${index})" class="p-2 bg-amber-50 text-amber-600 rounded-lg hover:bg-amber-600 hover:text-white transition" title="Disposisi">
                                    <i data-lucide="send" class="w-4 h-4"></i>
                                </button>
                                <button onclick="hapusSurat(${index})" class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition ${role === 'USER' ? 'hidden' : ''}">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
                tabel.innerHTML += row;
            });
            lucide.createIcons();
        }

        // Helper untuk merubah file ke base64
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // --- EVENT HANDLERS ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('berkasSurat');
            let fileName = "";
            let fileBase64 = "";

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 5242880) {
                    alert("Gagal! Ukuran file PDF maksimal adalah 5 MB.");
                    return;
                }
                if (file.type !== "application/pdf") {
                    alert("Gagal! File harus berformat PDF.");
                    return;
                }
                fileName = file.name;
                fileBase64 = await toBase64(file);
            }

            const newSurat = {
                noAgenda: document.getElementById('noAgenda').value,
                tglTerima: document.getElementById('tglTerima').value,
                tglSurat: document.getElementById('tglSurat').value,
                noSurat: document.getElementById('noSurat').value,
                asalSurat: document.getElementById('asalSurat').value,
                perihal: document.getElementById('perihal').value,
                posisi: document.getElementById('posisiSurat').value,
                status: document.getElementById('statusSurat').value,
                fileName: fileName,
                fileData: fileBase64
            };

            let arsip = JSON.parse(localStorage.getItem('arsipSuratMasuk')) || [];
            const index = parseInt(editIndexInput.value);

            try {
                if (index === -1) {
                    arsip.unshift(newSurat);
                    alert("Surat berhasil diregistrasi!");
                } else {
                    if (!fileBase64 && arsip[index].fileData) {
                        newSurat.fileName = arsip[index].fileName;
                        newSurat.fileData = arsip[index].fileData;
                    }
                    arsip[index] = newSurat;
                    alert("Data surat berhasil diperbarui!");
                    resetForm();
                }
                localStorage.setItem('arsipSuratMasuk', JSON.stringify(arsip));
                localStorage.setItem('dataSuratMasuk', JSON.stringify(arsip));
            } catch (err) {
                alert("Gagal menyimpan! Memori browser penuh. Hapus beberapa data lama atau unggah PDF yang lebih kecil.");
            }

            form.reset();
            loadData();
        });

        function viewFile(index) {
            const data = JSON.parse(localStorage.getItem('arsipSuratMasuk'));
            const item = data[index];
            if (item.fileData) {
                const newTab = window.open();
                newTab.document.write(`<iframe src="${item.fileData}" frameborder="0" style="border:0; top:0px; left:0px; bottom:0px; right:0px; width:100%; height:100%;" allowfullscreen></iframe>`);
            }
        }

        function editSurat(index) {
            const data = JSON.parse(localStorage.getItem('arsipSuratMasuk'));
            const item = data[index];

            document.getElementById('noAgenda').value = item.noAgenda;
            document.getElementById('tglTerima').value = item.tglTerima;
            document.getElementById('tglSurat').value = item.tglSurat;
            document.getElementById('noSurat').value = item.noSurat;
            document.getElementById('asalSurat').value = item.asalSurat;
            document.getElementById('perihal').value = item.perihal;
            document.getElementById('posisiSurat').value = item.posisi;
            document.getElementById('statusSurat').value = item.status;

            editIndexInput.value = index;
            document.getElementById('form-title').innerHTML = '<i data-lucide="edit" class="text-amber-500"></i> Edit Data Surat';
            document.getElementById('btnSimpan').innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4"></i> Update Data';
            document.getElementById('cancelEdit').classList.remove('hidden');

            window.scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        }

        document.getElementById('cancelEdit').addEventListener('click', resetForm);

        function resetForm() {
            form.reset();
            editIndexInput.value = "-1";
            document.getElementById('form-title').innerHTML = '<i data-lucide="file-plus" class="text-indigo-600"></i> Registrasi Surat Baru';
            document.getElementById('btnSimpan').innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> Simpan Registrasi';
            document.getElementById('cancelEdit').classList.add('hidden');
            lucide.createIcons();
        }

        function hapusSurat(index) {
            if (confirm("Hapus surat ini dari arsip?")) {
                let arsip = JSON.parse(localStorage.getItem('arsipSuratMasuk'));
                arsip.splice(index, 1);
                localStorage.setItem('arsipSuratMasuk', JSON.stringify(arsip));
                localStorage.setItem('dataSuratMasuk', JSON.stringify(arsip));
                loadData();
            }
        }

        function exportExcel() {
            const arsip = JSON.parse(localStorage.getItem('arsipSuratMasuk')) || [];
            if (arsip.length === 0) return alert("Tidak ada data untuk diekspor");

            // Hapus data base64 sebelum export agar file excel tidak berat
            const cleanData = arsip.map(({ fileData, ...rest }) => rest);

            const ws = XLSX.utils.json_to_sheet(cleanData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Surat Masuk");
            XLSX.writeFile(wb, "Arsip_Surat_Masuk_2026.xlsx");
        }

        function disposisiSurat(index) {
            alert("Surat sedang diteruskan untuk diproses sesuai alur tata naskah.");
        }

        // Inisialisasi
        loadData();
        lucide.createIcons();
    </script>
</body>

</html>
